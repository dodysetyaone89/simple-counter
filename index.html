<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Counter Sederhana</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <p class="title"><i class="fa-solid fa-sliders"></i> Counter</p>

    <div class="angka nol" id="angka">0</div>
    <p class="label-status" id="status">Mulai hitung &nbsp;✨</p>

    <div class="buttons">
      <button class="btn-minus" onclick="kurang()" title="Kurangi">
        <i class="fa-solid fa-minus"></i>
      </button>

      <button class="btn-reset" onclick="reset()" title="Reset">
        <i class="fa-solid fa-rotate-left"></i>
      </button>

      <button class="btn-plus" onclick="tambah()" title="Tambah">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
